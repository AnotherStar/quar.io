services:
  postgres:
    image: postgres:16-alpine
    container_name: manualonline-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: manualonline
      POSTGRES_PASSWORD: manualonline
      POSTGRES_DB: manualonline
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manualonline"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: manualonline-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: manualonline
      MINIO_ROOT_PASSWORD: manualonline-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 manualonline manualonline-secret;
      mc mb -p local/manualonline-media || true;
      mc anonymous set public local/manualonline-media || true;
      exit 0;
      "

volumes:
  pg_data:
  minio_data:
